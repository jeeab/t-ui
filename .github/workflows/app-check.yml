name: Check submitted apps

# Every pull request that touches an app gets checked automatically. A green tick means
# the submission is safe to look at; a red X means the checker found something and left a
# plain-English explanation in the log. Jake still approves and merges by hand - this only
# filters out the obviously broken and the obviously sketchy.
on:
  pull_request:
    paths:
      - "apps/**"
      - "tools/check_app.py"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "tools/check_app.py"
  workflow_dispatch:

# A submission is untrusted code. Give the job no write access to anything.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The checker never executes the submitted Lua - it only reads it as text.
      - name: Safety and sanity check
        run: python3 tools/check_app.py

      # Second opinion: does the file actually parse as Lua? luac -p compiles without
      # running, so a submitted script still never executes here.
      - name: Lua syntax check
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lua5.4
          fail=0
          for f in apps/*/main.lua; do
            if luac5.4 -p "$f"; then
              echo "ok      $f"
            else
              echo "SYNTAX  $f - this file is not valid Lua"
              fail=1
            fi
          done
          exit $fail
